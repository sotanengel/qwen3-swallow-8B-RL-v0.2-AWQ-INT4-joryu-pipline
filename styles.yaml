# 形式（フォーマット）プリセット。SFT 教師データの多様性確保用。
# `joryu-distill --style prose,qa_short,dialog,report` で参照。
#
# 文体（口調）プリセット polite/casual/expert は実測で形式に影響しないため #90 で削除した。
styles:
  prose:
    label: "散文"
    instruction: "マークダウン記号や箇条書き、表は使わず、一段落の自然な日本語の文章で答えてください。"
  qa_short:
    label: "短答"
    instruction: "結論を最初の1〜2文で述べ、補足を簡潔に1〜2文加えてください。"
  dialog:
    label: "対話"
    instruction: "マークダウン記号・見出し・箇条書き・表は使わず、会話の一往復として 2〜4 文で短く答えてください。"
  report:
    label: "レポート"
    instruction: "見出し・箇条書き・表を活用し、構造化されたレポート形式で答えてください。"
