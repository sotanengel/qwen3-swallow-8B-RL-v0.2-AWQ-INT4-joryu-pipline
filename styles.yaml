# 文体プリセット。`joryu-distill --style polite,casual` で参照。
styles:
  polite:
    label: "丁寧語"
    instruction: "回答は丁寧語（です・ます調）で、敬意をもって書いてください。"
  casual:
    label: "カジュアル"
    instruction: "回答はカジュアルで親しみやすい口調で書いてください。"
  expert:
    label: "専門家向け"
    instruction: "回答は専門家向けに、専門用語を適切に使い、論理的かつ簡潔に書いてください。"
  prose:
    label: "散文"
    instruction: "マークダウン記号や箇条書き、表は使わず、一段落の自然な日本語の文章で答えてください。"
  qa_short:
    label: "短答"
    instruction: "結論を最初の1〜2文で述べ、補足を簡潔に1〜2文加えてください。"
  dialog:
    label: "対話"
    instruction: "会話のように親しみのある短い応答で答えてください。"
  report:
    label: "レポート"
    instruction: "見出し・箇条書き・表を活用し、構造化されたレポート形式で答えてください。"
