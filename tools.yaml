# 蒸留用ツール定義 (OpenAI / Qwen3 互換 JSON Schema)
# `joryu-distill` の各プロンプト行から tool_ids で参照される。
tools:
  search:
    description: "Web を検索して関連スニペットを返す。"
    invocation_rule: "ユーザーが事実・最新情報・統計を尋ねたら必ず呼ぶ。"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "検索クエリ"
        top_k:
          type: integer
          description: "返却件数 (デフォルト 5)"
          default: 5
      required: [query]

  calc:
    description: "数式を評価して結果を返す。"
    invocation_rule: "数値計算が必要なら必ず呼ぶ。"
    parameters:
      type: object
      properties:
        expression:
          type: string
          description: "評価する Python 式 (純算術のみ)"
      required: [expression]

  fetch_url:
    description: "URL からテキスト本文を取得する。"
    invocation_rule: "特定 URL の内容確認が必要なら必ず呼ぶ。"
    parameters:
      type: object
      properties:
        url:
          type: string
          format: uri
      required: [url]

  weather:
    description: "指定した地点の現在天気と当日予報を返す。"
    invocation_rule: "ユーザが特定地点の天気/気温/降水を尋ねたら必ず呼ぶ。"
    parameters:
      type: object
      properties:
        location:
          type: string
          description: "都市名 (例: 東京, Tokyo) または lat,lon"
        date:
          type: string
          format: date
          description: "ISO 日付 (省略時は今日 JST)"
      required: [location]
