# joryu 既定設定。RTX 3060 Ti (8GB VRAM) + AWQ-INT4 (awq_marlin) を想定。
# 互換性メモ:
#   - dtype は bfloat16 必須 (fp16 だと awq_marlin が token=0 を吐く既知バグ)
#   - num_ctx=4096 / num_predict=2048 は KV cache FP8 + prefix caching 前提
#     (旧 2048/1024 から倍増。VRAM が足りない環境では VRAM プローブで自動降格可)
#   - scripts/probe_vllm_limits.py で GPU 上限を data/vllm_limits.json に記録
#   - VLLM_USE_FLASHINFER_SAMPLER=0 を実行環境で設定 (Docker delegate が自動)
model:
  name: "Qwen3-Swallow-8B-RL-v0.2-AWQ-INT4"
  num_ctx: 4096
  num_predict: 2048
  limits_probe_file: "data/vllm_limits.json"
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  repetition_penalty: 1.05
  seed: 42
  mode: "thinking"            # "thinking" | "nothinking"

vllm:
  model_path: "tokyotech-llm/Qwen3-Swallow-8B-RL-v0.2-AWQ-INT4"
  dtype: "bfloat16"
  quantization: "awq_marlin"
  gpu_memory_utilization: 0.85
  enforce_eager: true
  # KV キャッシュ FP8 化で実効容量を ~2 倍にする (品質影響は実質ゼロ)。
  # 旧挙動に戻したい場合は "auto"。
  kv_cache_dtype: "fp8"
  # 共通 system_prompt の KV を再利用 (蒸留では全行で同じプロンプトを使うため有効)。
  enable_prefix_caching: true
  # 蒸留は逐次 1 件のため KV ブロックプールを最小化。
  max_num_seqs: 1
  # KV を CPU 側にスピルさせる退避領域 (GiB)。0 で無効。
  swap_space_gib: 4

distill:
  prompt_bank: "data/prompts/training_prompts.jsonl"
  # joryu-up: bank 未作成時に CSV から自動生成 (任意。空なら JORYU_PROMPT_CSV / 既定パス)
  prompt_csv: ""
  out_dir: "data/distilled"
  out_file: "responses.jsonl"
  min_interval_sec: 0.5
  styles_file: "styles.yaml"
  system_prompt: |
    あなたは丁寧で正確な日本語アシスタントです。
    ユーザの質問に、根拠を示しながら自然な日本語で答えてください。

search:
  index_dir: "data/distilled/.search_index"
  top_k_default: 50
  snippet_chars: 200

export:
  out_dir: "exports"
  compression: "zstd"
  level: 19
  bundle_tar: false

# joryu-curate (高品質サブセット抽出) 設定。
# 詳細は要件定義書 R-09〜R-25 を参照。
# 設定変更は 3 層ハッシュ (signal/judge/scoring) で検知され、
# 影響範囲だけが再計算される (--rescore-only で閾値のみ調整可)。
curate:
  # 合成スコア重み (要件 6.3)
  weights_stat: 0.4
  weights_llm: 0.6

  # 採否しきい値 (--top-k / --keep-rate でも上書き可)
  threshold: 0.7
  top_k: null
  keep_rate: null

  # judge (LLM 評価器) 設定
  judge_model: "joryu"
  judge_mode: "nothinking"      # "thinking" | "nothinking"
  skip_llm: false               # true で統計シグナルのみ

  # 出力先 (子ディレクトリ <YYYYMMDD_HHMMSS>/ が自動付与される)
  out_dir: "data/curated"

  # 統計シグナルのハード棄却閾値 (要件 6.1)
  thresholds:
    len_a_min: 30
    len_a_max: 4000
    len_t_min: 20
    len_t_max: 8000
    ratio_ta_min: 0.05
    ratio_ta_max: 10.0
    lang_ja_min: 0.6
    repeat_ng_max: 0.25
    repeat_char_max: 30
    dup_glob_jaccard: 0.9
    samp_out_z_min: -2.0
    samp_out_min_bucket_size: 5
    style_adh_default_min: 0.3
