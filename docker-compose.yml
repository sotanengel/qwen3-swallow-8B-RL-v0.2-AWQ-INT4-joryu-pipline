# joryu インフラ。実行環境: Windows + RTX 3060 Ti / Docker Desktop(WSL2) + NVIDIA Container Toolkit
# 起動: docker compose build joryu

services:
  joryu:
    build:
      context: .
      dockerfile: Dockerfile
    image: joryu:latest
    container_name: joryu
    # vLLM v1 はワーカ IPC で /dev/shm を使う。デフォルト 64MB だと
    # prefix cache / KV swap が詰まることがあるため 2GiB に拡張。
    shm_size: "2gb"
    ports:
      - "8100:8100"
    environment:
      - VLLM_USE_DEEP_GEMM=0
      - VLLM_DEEP_GEMM_WARMUP=skip
      - VLLM_USE_FLASHINFER_SAMPLER=0
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./dashboard/public:/app/dashboard/public
      - ./config.yaml:/app/config.yaml:ro
      - ./styles.yaml:/app/styles.yaml:ro
      - ./tools.yaml:/app/tools.yaml:ro
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["joryu-llm-serve", "--host", "0.0.0.0", "--port", "8100"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 300s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: joryu-dashboard:latest
    container_name: joryu-dashboard
    ports:
      - "3000:3000"
    environment:
      - JORYU_API_PROXY_TARGET=http://api:8000
    depends_on:
      api:
        condition: service_started
    volumes:
      # public は rw にして responses.jsonl の bind mount マウントポイントを作成可能にする。
      # stats.json / responses.jsonl はホスト側 (joryu-stats / 蒸留) から更新される。
      - ./dashboard/public:/app/public
      - ./data/distilled/responses.jsonl:/app/public/responses.jsonl:ro
    restart: "on-failure:3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: joryu-api:latest
    container_name: joryu-api
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - JORYU_REPO_ROOT=/workspace
      - JORYU_USE_COMPOSE_RUN=1
      - JORYU_VLLM_URL=http://joryu:8100
      - PYTHONPATH=/workspace/src
      # DooD: api コンテナ内 /workspace をホストパスへ解決できない場合の手動指定
      - JORYU_HOST_REPO_ROOT=${JORYU_HOST_REPO_ROOT:-}
    depends_on:
      joryu:
        condition: service_healthy
    restart: "on-failure:3"

volumes:
  hf-cache:
