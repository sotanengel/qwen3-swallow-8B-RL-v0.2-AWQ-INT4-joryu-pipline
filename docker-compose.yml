# joryu インフラ。実行環境: Windows + RTX 3060 Ti / Docker Desktop(WSL2) + NVIDIA Container Toolkit
# 起動: uv run joryu-up --detach
# GPU profile: distill (既定) / seed_gen / screening — 同時常駐不可 (ADR 0005)

x-joryu-gpu: &joryu_gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  shm_size: "2gb"
  environment:
    - HF_HOME=/root/.cache/huggingface
    - VLLM_USE_DEEP_GEMM=0
    - VLLM_DEEP_GEMM_WARMUP=skip
    - VLLM_USE_FLASHINFER_SAMPLER=0
    - VLLM_ATTENTION_BACKEND=FLASH_ATTN

services:
  joryu:
    profiles: [distill]
    build:
      context: .
      dockerfile: Dockerfile
    image: joryu:latest
    container_name: joryu
    <<: *joryu_gpu
    ports:
      - "8100:8100"
    environment:
      - JORYU_REPO_ROOT=/app
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./dashboard/public:/app/dashboard/public
      - ./config.yaml:/app/config.yaml:ro
      - ./styles.yaml:/app/styles.yaml:ro
      - ./tools.yaml:/app/tools.yaml:ro
      - hf-cache:/root/.cache/huggingface
    command:
      - vllm
      - serve
      - tokyotech-llm/Qwen3-Swallow-8B-RL-v0.2-AWQ-INT4
      - --host=0.0.0.0
      - --port=8100
      - --quantization=awq_marlin
      - --dtype=bfloat16
      - --max-model-len=4096
      - --gpu-memory-utilization=0.85
      - --kv-cache-dtype=fp8
      - --enable-prefix-caching
      - --max-num-seqs=1
      - --enforce-eager
      - --enable-auto-tool-choice
      - --tool-call-parser=hermes
      - --reasoning-parser=qwen3
    restart: "on-failure:3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 300s

  joryu-seed:
    profiles: [seed_gen]
    image: joryu:latest
    container_name: joryu-seed
    <<: *joryu_gpu
    ports:
      - "8110:8110"
    environment:
      - JORYU_REPO_ROOT=/app
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - hf-cache:/root/.cache/huggingface
    command:
      - vllm
      - serve
      - Qwen/Qwen2.5-7B-Instruct-AWQ
      - --host=0.0.0.0
      - --port=8110
      - --quantization=awq_marlin
      - --dtype=bfloat16
      - --max-model-len=4096
      - --gpu-memory-utilization=0.80
      - --max-num-seqs=1
      - --enforce-eager
    restart: "on-failure:3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8110/health"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 300s

  joryu-judge:
    profiles: [screening]
    build:
      context: .
      dockerfile: Dockerfile.judge
    image: joryu-judge:latest
    container_name: joryu-judge
    <<: *joryu_gpu
    ports:
      - "8080:8080"
    volumes:
      - gguf-cache:/models
    environment:
      - JORYU_JUDGE_MODEL=Llama-3.1-Swallow-8B-Instruct-v0.5-Q4_K_M.gguf
      - JORYU_JUDGE_HF_REPO=tokyotech-llm/Llama-3.1-Swallow-8B-Instruct-v0.5-GGUF
    restart: "on-failure:3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 120s

  dashboard:
    profiles: [always]
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: joryu-dashboard:latest
    container_name: joryu-dashboard
    ports:
      - "3000:3000"
    environment:
      - JORYU_API_PROXY_TARGET=http://api:8000
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./dashboard/public:/app/public
      - ./data/distilled/responses.jsonl:/app/public/responses.jsonl:ro
    restart: "on-failure:3"

  mcp:
    profiles: [always]
    image: joryu-api:latest
    container_name: joryu-mcp
    ports:
      - "8200:8200"
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
    working_dir: /app
    environment:
      - JORYU_REPO_ROOT=/workspace
      - PYTHONPATH=/workspace/src
    command: ["joryu-mcp", "--http", "--host", "0.0.0.0", "--port", "8200"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: "on-failure:3"

  api:
    profiles: [always]
    build:
      context: .
      dockerfile: Dockerfile.api
    image: joryu-api:latest
    container_name: joryu-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - JORYU_REPO_ROOT=/workspace
      - JORYU_USE_COMPOSE_RUN=1
      - JORYU_VLLM_URL=http://joryu:8100
      - JORYU_HOST_REPO_ROOT=${JORYU_HOST_REPO_ROOT:-}
      - PYTHONPATH=/workspace/src
    depends_on:
      joryu:
        condition: service_healthy
    restart: "on-failure:3"

volumes:
  hf-cache:
  gguf-cache:
