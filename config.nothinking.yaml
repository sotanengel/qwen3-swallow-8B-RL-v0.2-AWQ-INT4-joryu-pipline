# 非推論モード向けプリセット。`uv run joryu-distill --config config.nothinking.yaml` で使う。
# config.yaml との差分は model.mode のみ。
model:
  name: "Qwen3-Swallow-8B-RL-v0.2-AWQ-INT4"
  num_ctx: 4096
  num_predict: 2048
  limits_probe_file: "data/vllm_limits.json"
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  repetition_penalty: 1.05
  seed: 42
  mode: "nothinking"

vllm:
  model_path: "tokyotech-llm/Qwen3-Swallow-8B-RL-v0.2-AWQ-INT4"
  dtype: "bfloat16"
  quantization: "awq_marlin"
  gpu_memory_utilization: 0.85
  enforce_eager: true
  kv_cache_dtype: "fp8"
  enable_prefix_caching: true
  max_num_seqs: 1
  swap_space_gib: 4

distill:
  prompt_bank: "data/prompts/training_prompts.jsonl"
  out_dir: "data/distilled"
  out_file: "responses.jsonl"
  min_interval_sec: 0.5
  system_prompt: |
    あなたは丁寧で正確な日本語アシスタントです。
    ユーザの質問に、自然な日本語で答えてください。

export:
  out_dir: "exports"
  compression: "zstd"
  level: 19
  bundle_tar: false
