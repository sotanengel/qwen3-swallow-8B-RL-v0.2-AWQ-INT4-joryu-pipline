# pre-commit 設定。コミット前に format / lint / GitHub Actions セキュリティ検査を回す。
# pytest / verify_pipeline / カバレッジ閾値は .github/workflows/ci.yml (GitHub Actions) で実行する。
# 初回: bash scripts/setup-dev.sh
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: lint-jsonl
        name: lint JSONL (valid object per line)
        entry: uv run python scripts/lint_jsonl.py
        language: system
        files: \.jsonl$
      - id: pinact
        name: pinact (verify GitHub Actions are pinned)
        entry: pinact run --fix=false --no-api
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
