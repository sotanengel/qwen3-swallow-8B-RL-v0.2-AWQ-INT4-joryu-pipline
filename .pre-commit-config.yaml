# pre-commit 設定。コミット前に format / lint / GitHub Actions セキュリティ検査を回す。
# pre-push で pytest カバレッジ閾値 + CI ゲート (scripts/check.sh) を実行。
# 初回: bash scripts/setup-dev.sh
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: pinact
        name: pinact (verify GitHub Actions are pinned)
        entry: pinact run --fix=false --no-api
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
      - id: pytest-coverage
        name: pytest coverage gate (minimum threshold)
        entry: bash scripts/check_coverage.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: ci-gate-pre-push
        name: CI gate pre-push (scripts/check.sh)
        entry: bash scripts/check.sh --skip-pre-commit --skip-pytest
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
