name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest --cov=joryu --cov-report=term-missing

  security:
    name: Workflow Security (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install pinact
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          base="https://github.com/suzuki-shunsuke/pinact/releases/download/v4.1.0"
          curl -sSfL -O "$base/pinact_linux_amd64.tar.gz"
          curl -sSfL -O "$base/pinact_4.1.0_checksums.txt"
          sha256sum --ignore-missing -c pinact_4.1.0_checksums.txt
          tar -xzf pinact_linux_amd64.tar.gz pinact
          sudo install pinact /usr/local/bin/pinact
          pinact --version

      - name: Run pre-commit (security hooks)
        run: uvx pre-commit run --all-files --show-diff-on-failure

  dashboard:
    name: Dashboard build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build
